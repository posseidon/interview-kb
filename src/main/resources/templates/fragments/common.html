<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${title}">Engineering Handbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&amp;family=EB+Garamond:wght@400;600&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/handbook.css}" />
</head>
<body>
<th:block th:fragment="nav">
  <nav class="hb-nav">
    <span class="hb-nav-label">Handbook</span>
    <button class="hb-nav-btn" id="hb-nav-btn" type="button"
            onclick="toggleBrowse()" aria-label="Browse topics and tags">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
           stroke="currentColor" stroke-width="1.5">
        <circle cx="7" cy="7" r="4.5"></circle>
        <line x1="10.6" y1="10.6" x2="14" y2="14"></line>
      </svg>
    </button>
  </nav>

  <div class="hb-browse-panel" id="hb-browse-panel" style="display:none;" aria-hidden="true">
    <div class="hb-browse-panel-inner">
      <div class="hb-browse-panel-label">Search the index by</div>
      <div class="hb-browse-tabs">
        <button class="hb-browse-tab hb-browse-tab--active" id="hb-tab-topics"
                type="button" onclick="switchBrowseTab('topics')">Topics</button>
        <button class="hb-browse-tab" id="hb-tab-tags"
                type="button" onclick="switchBrowseTab('tags')">Tags</button>
      </div>
      <input class="hb-browse-input" type="text" id="hb-browse-q"
             placeholder="Search topics..." autocomplete="off"
             oninput="onBrowseInput(this.value)" />
      <div id="hb-browse-results">
        <div class="hb-filter-empty">Start typing to search topics.</div>
      </div>
    </div>
  </div>

  <script>
    var _browseTab = 'topics';
    var _browseTimer;

    function toggleBrowse() {
      var panel = document.getElementById('hb-browse-panel');
      var btn   = document.getElementById('hb-nav-btn');
      var open  = panel.style.display !== 'none';
      panel.style.display = open ? 'none' : 'block';
      panel.setAttribute('aria-hidden', String(open));
      btn.classList.toggle('hb-nav-btn--active', !open);
      if (!open) {
        var inp = document.getElementById('hb-browse-q');
        inp.value = '';
        document.getElementById('hb-browse-results').innerHTML =
          '<div class="hb-filter-empty">Start typing to search topics.</div>';
        inp.focus();
      }
    }

    function switchBrowseTab(tab) {
      _browseTab = tab;
      document.getElementById('hb-tab-topics').classList.toggle('hb-browse-tab--active', tab === 'topics');
      document.getElementById('hb-tab-tags').classList.toggle('hb-browse-tab--active', tab === 'tags');
      var inp = document.getElementById('hb-browse-q');
      inp.placeholder = tab === 'topics' ? 'Search topics...' : 'Search tags...';
      inp.value = '';
      inp.focus();
      document.getElementById('hb-browse-results').innerHTML =
        '<div class="hb-filter-empty">Start typing to search ' + tab + '.</div>';
    }

    function onBrowseInput(query) {
      clearTimeout(_browseTimer);
      var el = document.getElementById('hb-browse-results');
      if (!query.trim()) {
        el.innerHTML = '<div class="hb-filter-empty">Start typing to search ' + _browseTab + '.</div>';
        return;
      }
      _browseTimer = setTimeout(function () {
        var url = _browseTab === 'topics'
          ? '/topics?q=' + encodeURIComponent(query)
          : '/tags?q='   + encodeURIComponent(query);
        fetch(url)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (!data.length) {
              el.innerHTML = '<div class="hb-filter-empty">No ' + _browseTab + ' match.</div>';
              return;
            }
            if (_browseTab === 'topics') {
              el.innerHTML = data.map(function (t) {
                return '<a class="hb-topic-row hb-topic-row--simple" href="/search?topic='
                  + encodeURIComponent(t.slug) + '">' + escHtml(t.name) + '</a>';
              }).join('');
            } else {
              el.innerHTML = '<div class="hb-tag-chips">'
                + data.map(function (t) {
                    return '<a class="hb-tag-chip" href="/search?tag='
                      + encodeURIComponent(t.name) + '">' + escHtml(t.name) + '</a>';
                  }).join('')
                + '</div>';
            }
          });
      }, 200);
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</th:block>
</body>
</html>
