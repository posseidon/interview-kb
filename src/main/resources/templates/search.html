<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Search &amp; Ask')}"></head>
<body>
  <th:block th:replace="~{fragments/common :: nav}"></th:block>

  <main class="hb-page hb-page--search">
    <div class="hb-search-layout">

      <aside class="hb-search-sidebar">
        <a class="hb-back" th:href="@{/}">&lt; Home</a>
        <div class="hb-query" th:text="'> ' + ${query}">&gt; query text</div>

        <div class="hb-synthesis-card" th:if="${isAsk and hasMatches}">
          <div class="hb-synthesis-label">AI SYNTHESIS</div>
          <div class="hb-bullet" th:each="bullet : ${synthesisBullets}">
            <span class="hb-bullet-dot"></span>
            <span class="hb-bullet-text" th:text="${bullet}">N questions indexed.</span>
          </div>
        </div>
      </aside>

      <section class="hb-search-results">
        <th:block th:if="${hasMatches}">
          <th:block th:each="group, stat : ${groups}">
            <div th:classappend="${stat.even} ? 'hb-cluster-header--solid' : 'hb-cluster-header--outline'"
                 class="hb-cluster-header"
                 th:text="${group.topic} + ' — ' + ${group.count}">
              KAFKA — 5
            </div>
            <a class="hb-question-row" th:each="q : ${group.items}"
               th:href="@{/questions/{id}(id=${q.id})}">
              <div class="hb-question-icon">
                <svg th:if="${q.requiresImpl}" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="8 7 3 12 8 17"></polyline>
                  <polyline points="16 7 21 12 16 17"></polyline>
                </svg>
                <svg th:unless="${q.requiresImpl}" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 6 C12 5 11 4 8 4 H4 v14 h4 c3 0 4 1 4 2"></path>
                  <path d="M12 6 C12 5 13 4 16 4 H20 v14 h-4 c-3 0 -4 1 -4 2"></path>
                </svg>
              </div>
              <div class="hb-question-body">
                <div class="hb-question-title" th:text="${q.content}">Question title</div>
                <div class="hb-question-tag"
                     th:text="${(q.requiresImpl ? 'Coding' : 'Theoretical') + (#lists.isEmpty(q.tags) ? '' : ' · ' + q.tags[0])}">
                  TYPE · TAG
                </div>
              </div>
            </a>
          </th:block>
        </th:block>

        <div class="hb-empty" th:unless="${hasMatches}">No matches found. Query recorded.</div>
      </section>

    </div>
  </main>
</body>
</html>
