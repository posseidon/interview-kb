<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <!-- Blue rounded-square app background -->
    <rect width="32" height="32" rx="6" fill="#0052FF"/>
    <!-- Left book page -->
    <path d="M7 9 L15 10.5 L15 23 L7 21.5 Z" fill="white" opacity="0.65"/>
    <!-- Right book page -->
    <path d="M25 9 L17 10.5 L17 23 L25 21.5 Z" fill="white"/>
    <!-- Spine -->
    <rect x="15" y="9" width="2" height="14" fill="white" opacity="0.45"/>
    <!-- > code-prompt chevron on right page (blue on white) -->
    <polyline
            points="19,14.5 22.5,16.5 19,18.5"
            fill="none"
            stroke="#0052FF"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
