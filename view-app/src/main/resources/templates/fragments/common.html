<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title th:text="${title}">Engineering Handbook</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&amp;family=EB+Garamond:wght@400;600&amp;display=swap"
      rel="stylesheet"/>
  <link rel="icon" th:href="@{/favicon.svg}" type="image/svg+xml"/>
  <link rel="stylesheet" th:href="@{/css/handbook.css}"/>
</head>
<body>
<th:block th:fragment="nav">
  <nav class="hb-nav">
    <div class="hb-nav-brand">
      <div class="hb-basket-menu">
        <a aria-label="Basket" class="hb-nav-icon-link hb-nav-icon-link--basket"
           th:href="@{/basket}" title="Basket">
          <svg fill="none" height="16" stroke="currentColor" stroke-linecap="round"
               stroke-linejoin="round" stroke-width="1.5" viewBox="0 0 16 16" width="16">
            <rect height="8" rx="1.5" width="12" x="2" y="6"/>
            <path d="M6 6V4.5A1.5 1.5 0 0 1 7.5 3h1A1.5 1.5 0 0 1 10 4.5V6"/>
            <line x1="2" x2="14" y1="9.5" y2="9.5"/>
          </svg>
          <span class="hb-basket-badge" th:if="${basketSize} != null and ${basketSize} > 0"
                th:text="${basketSize}">0</span>
        </a>
        <button aria-expanded="false" aria-haspopup="true" aria-label="Basket actions"
                class="hb-basket-menu-toggle" type="button">
          <svg fill="none" height="8" stroke="currentColor" stroke-linecap="round"
               stroke-linejoin="round" stroke-width="1.5" viewBox="0 0 8 8" width="8">
            <polyline points="1 2.5 4 5.5 7 2.5"/>
          </svg>
        </button>
        <div class="hb-basket-dropdown" hidden>
          <form method="post" th:action="@{/basket/checkout}">
            <button class="hb-basket-dropdown-item" type="submit">Checkout</button>
          </form>
          <form method="post" th:action="@{/basket/clear}">
            <button class="hb-basket-dropdown-item" type="submit">Clear</button>
          </form>
        </div>
      </div>
    </div>
    <form class="hb-nav-search" method="get" th:action="@{/search}">
      <svg class="hb-nav-search-icon" fill="none" height="14" stroke="currentColor"
           stroke-width="1.5"
           viewBox="0 0 16 16" width="14">
        <circle cx="7" cy="7" r="4.5"></circle>
        <line x1="10.6" x2="14" y1="10.6" y2="14"></line>
      </svg>
      <input autocomplete="off" class="hb-nav-search-input" name="q"
             placeholder="Search questions…" th:value="${query}" type="search"/>
    </form>
    <div class="hb-nav-actions">
      <a aria-label="Browse skills" class="hb-nav-icon-link"
         th:href="@{/skills}" title="Browse skills">
        <svg fill="none" height="16" stroke="currentColor" stroke-linecap="round"
             stroke-width="1.5" viewBox="0 0 16 16" width="16">
          <rect height="5" rx="1" width="5" x="2" y="2"/>
          <rect height="5" rx="1" width="5" x="9" y="2"/>
          <rect height="5" rx="1" width="5" x="2" y="9"/>
          <rect height="5" rx="1" width="5" x="9" y="9"/>
        </svg>
      </a>
      <a aria-label="My interviews" class="hb-nav-icon-link"
         th:href="@{/interviews}" title="My interviews">
        <svg fill="none" height="16" stroke="currentColor" stroke-linecap="round"
             stroke-linejoin="round" stroke-width="1.5" viewBox="0 0 16 16" width="16">
          <circle cx="5.5" cy="5.5" r="2"/>
          <path d="M1.5 13c0-2.2 1.6-3.8 4-3.8s4 1.6 4 3.8"/>
          <circle cx="11.5" cy="6" r="1.6"/>
          <path d="M8.8 13c.2-1.8 1.4-3 2.7-3s2.4 1 2.6 2.6"/>
        </svg>
      </a>
    </div>
  </nav>
  <script th:inline="none">
    (function () {
      var menu = document.querySelector('.hb-basket-menu');
      if (!menu || menu.dataset.bound) {
        return;
      }
      menu.dataset.bound = 'true';
      var toggle = menu.querySelector('.hb-basket-menu-toggle');
      var dropdown = menu.querySelector('.hb-basket-dropdown');

      function close() {
        dropdown.hidden = true;
        toggle.setAttribute('aria-expanded', 'false');
      }

      toggle.addEventListener('click', function (e) {
        e.stopPropagation();
        var willOpen = dropdown.hidden;
        dropdown.hidden = !willOpen;
        toggle.setAttribute('aria-expanded', String(willOpen));
      });

      document.addEventListener('click', function (e) {
        if (!menu.contains(e.target)) {
          close();
        }
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          close();
        }
      });
    })();
  </script>
</th:block>

<th:block th:fragment="skillLevelPicker(skillId, level)">
  <input name="skillId" th:value="${skillId}" type="hidden"/>
  <input class="hb-level-select" name="level" th:value="${level}" type="hidden"/>
  <div class="hb-skill-form-actions">
    <div class="hb-battery" th:attr="data-level=${level}">
      <div class="hb-battery-segment" data-index="1" data-level="NOVICE" title="Novice"></div>
      <div class="hb-battery-segment" data-index="2" data-level="INTERMEDIATE"
           title="Intermediate"></div>
      <div class="hb-battery-segment" data-index="3" data-level="ADVANCED" title="Advanced"></div>
      <div class="hb-battery-segment" data-index="4" data-level="EXPERT" title="Expert"></div>
    </div>
    <button aria-label="Add to basket" class="hb-btn-basket" title="Add to basket" type="submit">
      <svg class="hb-icon-basket-add" fill="none" height="18" stroke="currentColor"
           stroke-linecap="round"
           stroke-width="1.5"
           viewBox="0 0 16 16" width="18">
        <path d="M2 5h12l-1 8.5a1 1 0 0 1-1 0.9H4a1 1 0 0 1-1-0.9L2 5z"/>
        <path d="M5 5V4a3 3 0 0 1 6 0v1"/>
        <path d="M7 9.5h3M8.5 8v3" stroke-width="1.5"/>
      </svg>
      <svg class="hb-icon-basket-added" fill="none" height="18" stroke="currentColor"
           stroke-linecap="round"
           stroke-width="1.5" viewBox="0 0 16 16" width="18">
        <path d="M2 5h12l-1 8.5a1 1 0 0 1-1 0.9H4a1 1 0 0 1-1-0.9L2 5z"/>
        <path d="M5 5V4a3 3 0 0 1 6 0v1"/>
        <path d="M6 9.5l2 2 3-3.5" stroke-width="1.5"/>
      </svg>
    </button>
  </div>
</th:block>
</body>
</html>
