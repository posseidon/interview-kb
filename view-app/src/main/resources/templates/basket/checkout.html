<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Checkout')}"></head>
<body>
<th:block th:replace="~{fragments/common :: nav}"></th:block>

<main class="hb-page hb-page--detail">
    <a class="hb-back" th:href="@{/basket}">&lt; Basket</a>
    <h1 class="hb-title">QUESTIONS</h1>
    <div class="hb-stat" th:text="${totalQuestions} + ' questions matched'">N questions matched</div>

    <th:block th:each="group, stat : ${groups}">
        <div class="hb-cluster-header"
             th:classappend="${stat.even} ? 'hb-cluster-header--solid' : 'hb-cluster-header--outline'"
             th:text="${group.skillName} + ' (' + ${group.level} + ') — ' + ${#lists.size(group.questions)}">
            SKILL (LEVEL) — N
        </div>

        <div class="hb-empty" th:if="${#lists.isEmpty(group.questions)}">No questions found for this skill/level yet.
        </div>

        <a class="hb-question-row" th:each="q : ${group.questions}" th:href="@{/questions/{id}(id=${q.id})}">
            <div class="hb-question-icon">
                <svg fill="none" height="12" stroke="currentColor" stroke-linecap="round"
                     stroke-width="1.5" viewBox="0 0 12 12" width="12">
                    <path d="M4 2L8 6L4 10"/>
                </svg>
            </div>
            <div class="hb-question-body">
                <div class="hb-question-title" th:text="${q.content}">Question title</div>
                <div class="hb-question-tag"
                     th:text="${q.requiresImpl ? 'Coding' : 'Theoretical'}">
                    TYPE
                </div>
            </div>
        </a>
    </th:block>
</main>
</body>
</html>
