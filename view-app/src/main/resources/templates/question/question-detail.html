<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(${question.content})}"></head>
<body>
<th:block th:replace="~{fragments/common :: nav}"></th:block>
<main class="hb-page hb-page--detail">
  <a class="hb-back"
     onclick="if(history.length>1){history.back();return false;}"
     th:href="${not #lists.isEmpty(question.skills)} ? @{/search(skill=${question.skills[0].id})} : @{/}">&lt;
    Back</a>
  <div class="hb-chip-row"
       th:if="${not #lists.isEmpty(question.skills)} or ${question.level != null}">
    <div class="hb-chip" th:if="${not #lists.isEmpty(question.skills)}"
         th:text="${question.skills[0].name}">KAFKA
    </div>
    <div class="hb-chip hb-chip--level" th:if="${question.level != null}"
         th:text="${question.level}">INTERMEDIATE
    </div>
  </div>
  <div class="hb-detail-title" id="hb-question-title" th:utext="${questionContentHtml}">Question
    title
  </div>

  <div class="hb-meta">
    <th:block th:if="${not #lists.isEmpty(question.skills)}">Skill: <span
        th:text="${question.skills[0].name}">kafka</span> &middot;
    </th:block>
    Added <span th:text="${createdAtDisplay}">Apr 2, 2026</span>
    <th:block th:if="${question.externalId != null}"> &middot; ID: <span
        th:text="${question.externalId}">ext-123</span></th:block>
  </div>

  <!-- Answers -->
  <th:block th:if="${not #lists.isEmpty(answerDetails)}">
    <div class="hb-answer-block" th:each="answer, stat : ${answerDetails}">
      <div class="hb-answer-divider" th:if="${not stat.first}"></div>

      <!-- Source label when there are multiple answers -->
      <div class="hb-answer-source"
           th:if="${#lists.size(answerDetails) > 1}"
           th:text="${answer.source}">human
      </div>

      <!-- Rendered markdown -->
      <div class="hb-answer-rendered"
           th:id="'hb-view-' + ${answer.id}"
           th:utext="${answer.htmlContent}"></div>
    </div>
  </th:block>

  <p class="hb-empty" th:if="${#lists.isEmpty(answerDetails)}">No answer yet.</p>
</main>

<script>
  /* Code blocks in rendered markdown: tap to copy */
  document.querySelectorAll('.hb-answer-rendered pre').forEach(function (pre) {
    pre.title = 'Tap to copy';
    pre.addEventListener('click', function () {
      var code = pre.querySelector('code') ? pre.querySelector('code').textContent
          : pre.textContent;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(code).catch(function () {
        });
      }
      pre.classList.add('hb-code--flash');
      setTimeout(function () {
        pre.classList.remove('hb-code--flash');
      }, 500);
    });
  });
</script>
</body>
</html>
